<!DOCTYPE html>
<html lang="ru">
<head><link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CR Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #f5f7f7; color: #2c4a4c; font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow: hidden; padding: 40px 20px; opacity: 0; animation: fadeIn 1.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .logo-wrapper { position: relative; width: 160px; height: 160px; margin: 0 auto 32px; display: flex; align-items: center; justify-content: center; }
    .breath-ring { position: absolute; top: 0; left: 0; width: 160px; height: 160px; border-radius: 50%; border: 1.5px solid #4a7c7e; animation: breathe 6s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 1; } }
    .logo-wrapper img { position: relative; z-index: 1; width: 90px; height: 90px; object-fit: contain; }

    .practice-type { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #2c4a4c; margin-bottom: 10px; font-weight: 500; }
    .session-label { font-size: 10px; letter-spacing: 2px; font-style: italic; color: #4a7c7e; margin-bottom: 12px; font-weight: 400; opacity: 0.9; }
    .timer { font-size: 48px; font-weight: 300; letter-spacing: 4px; color: #4a7c7e; opacity: 0.22; margin-bottom: 40px; font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

    .divider { width: 40px; height: 1px; background: #4a7c7e; opacity: 0.2; margin: 0 auto 28px; }

    .audio-section { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 36px; }
    .audio-title { font-size: 11px; color: #2c4a4c; letter-spacing: 4px; text-transform: uppercase; font-weight: 500; margin-bottom: 2px; }
    .audio-hint { font-size: 10px; color: #4a7c7e; letter-spacing: 2px; font-style: italic; opacity: 0.9; margin-bottom: 10px; }
    .audio-link { font-size: 11px; color: #4a7c7e; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; font-weight: 400; opacity: 0.9; transition: opacity 0.3s ease; padding-bottom: 2px; border-bottom: 1px solid transparent; }
    .audio-link:hover { opacity: 1; border-bottom-color: rgba(74,124,126,0.4); }

    .slogan { font-size: 12px; color: #4a7c7e; letter-spacing: 5px; font-weight: 400; text-transform: lowercase; opacity: 0.7; margin-bottom: 20px; }

    .schedule-mini { font-size: 9px; color: #4a7c7e; letter-spacing: 2px; text-transform: uppercase; opacity: 0.3; line-height: 2.2; text-align: center; }

    .music-btn { position: fixed; bottom: 24px; right: 32px; background: transparent; border: none; color: #4a7c7e; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; opacity: 0.7; transition: opacity 0.3s ease; }
    .music-btn:hover { opacity: 1; }
    .music-btn.pulsing { animation: pulseBtn 2s ease-in-out infinite; }
    @keyframes pulseBtn { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }

    .join-block { display: none; flex-direction: column; align-items: center; }
    .join-label { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #2c4a4c; margin-bottom: 32px; font-weight: 400; }
    .join-btn { background: transparent; border: 1px solid #4a7c7e; color: #2c4a4c; font-family: 'Montserrat', sans-serif; font-size: 12px; letter-spacing: 5px; text-transform: uppercase; padding: 18px 52px; cursor: pointer; transition: all 0.5s ease; font-weight: 400; width: 100%; max-width: 320px; }
    .join-btn:hover { background: #4a7c7e; color: #f5f7f7; }

    @media (max-width: 480px) {
      body { padding-bottom: 60px; }
      .timer { font-size: 34px; letter-spacing: 2px; }
      .logo-wrapper { width: 120px; height: 120px; margin-bottom: 24px; }
      .breath-ring { width: 120px; height: 120px; }
      .logo-wrapper img { width: 68px; height: 68px; }
      .music-btn { bottom: 16px; right: 20px; font-size: 9px; }
      .join-btn { padding: 16px 32px; font-size: 11px; }
      .audio-link { font-size: 10px; }
    }
  </style>
</head>
<body>
  <audio id="bg-music" loop><source src="music.mp3" type="audio/mp3"></audio>

  <div id="waiting-block">
    <div class="logo-wrapper" ondblclick="window.location.href='room.html'" style="cursor:default;">
      <div class="breath-ring"></div>
      <img src="logo.png" alt="CR Space">
    </div>
    <div class="practice-type">практика тела и дыхания</div>
    <div class="session-label" id="session-name">утренняя практика начнётся через</div>
    <div class="timer" id="timer">00:00:00</div>

    <div class="divider"></div>

    <div class="audio-section">
      <div class="audio-title">медитация в сопровождении</div>
      <div class="audio-hint">выбери свою - когда будешь готов</div>
      <a class="audio-link" href="audio.html?track=25">практика · 25 минут</a>
      <a class="audio-link" href="audio.html?track=40">практика · 40 минут</a>
    </div>

    <div class="slogan">calm · inspire · run</div>

    <div class="schedule-mini">
      <div>07:00 утренняя · 20:00 вечерняя</div>
      <div>по местному времени</div>
    </div>
  </div>

  <div class="join-block" id="join-block">
    <div class="logo-wrapper">
      <div class="breath-ring"></div>
      <img src="logo.png" alt="CR Space">
    </div>
    <div class="join-label" id="active-session-name">практика началась</div>
    <button class="join-btn" onclick="window.location.href='room.html'">Присоединиться</button>
  </div>

  <button class="music-btn pulsing" id="music-btn" onclick="toggleMusic()">♪ включить музыку</button>

  <script type="module">
    const userId = sessionStorage.getItem('tg_user_id');
    if (!userId) { window.location.href = 'login.html'; }

    const music = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');
    music.volume = 0.024;
    let musicStarted = false;

    music.play().then(() => {
      musicStarted = true;
      musicBtn.textContent = '♪ выключить музыку';
      musicBtn.classList.remove('pulsing');
    }).catch(() => {});

    document.addEventListener('touchstart', function onFirstTouch() {
      if (musicStarted) { document.removeEventListener('touchstart', onFirstTouch); return; }
      music.play().then(() => {
        musicStarted = true;
        musicBtn.textContent = '♪ выключить музыку';
        musicBtn.classList.remove('pulsing');
      }).catch(() => {});
      document.removeEventListener('touchstart', onFirstTouch);
    }, { passive: true });

    window.toggleMusic = function() {
      if (music.paused) {
        music.play();
        musicBtn.textContent = '♪ выключить музыку';
        musicBtn.classList.remove('pulsing');
        musicStarted = true;
      } else {
        music.pause();
        musicBtn.textContent = '♪ включить музыку';
        musicBtn.classList.add('pulsing');
      }
    }

    const MORNING_HOUR = 7;
    const EVENING_HOUR = 20;
    const SESSION_DURATION = 60;

    function getStatus() {
      const now = new Date();
      const totalMinutes = now.getHours() * 60 + now.getMinutes();
      const morningStart = MORNING_HOUR * 60;
      const eveningStart = EVENING_HOUR * 60;
      if (totalMinutes >= morningStart && totalMinutes < morningStart + SESSION_DURATION)
        return { active: true, name: "утренняя практика" };
      if (totalMinutes >= eveningStart && totalMinutes < eveningStart + SESSION_DURATION)
        return { active: true, name: "вечерняя практика" };
      return { active: false };
    }

    function getNextSession() {
      const now = new Date();
      const morning = new Date(); morning.setHours(MORNING_HOUR, 0, 0, 0);
      const evening = new Date(); evening.setHours(EVENING_HOUR, 0, 0, 0);
      if (now < morning) return { time: morning, name: "утренняя практика" };
      if (now < evening) return { time: evening, name: "вечерняя практика" };
      const tomorrow = new Date(morning);
      tomorrow.setDate(tomorrow.getDate() + 1);
      return { time: tomorrow, name: "утренняя практика" };
    }

    function update() {
      const status = getStatus();
      if (status.active) {
        document.getElementById('waiting-block').style.display = 'none';
        document.getElementById('join-block').style.display = 'flex';
        document.getElementById('active-session-name').textContent = status.name + ' началась';
      } else {
        document.getElementById('waiting-block').style.display = 'block';
        document.getElementById('join-block').style.display = 'none';
        const next = getNextSession();
        const diff = next.time - new Date();
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('timer').textContent =
          String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        document.getElementById('session-name').textContent = next.name + ' начнётся через';
      }
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
