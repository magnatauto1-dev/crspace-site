<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CR Space — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #000;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 40px 20px;
    }
    #status-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo-img { width: 180px; height: 180px; object-fit: contain; margin-bottom: 32px; opacity: 0.9; }
    .tagline { font-size: 13px; color: #4a7c7e; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 60px; margin-top: 8px; font-weight: 400; }
    .status-msg { font-size: 11px; color: #4a7c7e; letter-spacing: 3px; text-transform: uppercase; font-weight: 400; opacity: 0.7; }
    .error-msg { font-size: 11px; color: #c0a0a0; letter-spacing: 2px; text-transform: uppercase; display: none; margin-top: 24px; }
    #intro-screen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #f5f7f7;
      z-index: 100;
      transition: opacity 1.2s ease;
      align-items: center;
      justify-content: center;
    }
    #intro-screen video { width: 100%; height: 100%; object-fit: cover; }
    #intro-screen.fade-out { opacity: 0; pointer-events: none; }
    @media (max-width: 480px) {
      .logo-img { width: 140px; height: 140px; }
      .tagline { font-size: 11px; letter-spacing: 3px; }
    }
  </style>
</head>
<body>
  <div id="status-screen" style="display:none;">
    <img class="logo-img" src="logo.png" alt="CR Space">
    <div class="tagline">пространство ясного состояния</div>
    <div class="error-msg" id="error-msg">Доступ закрыт. Обратитесь к Павло.</div>
  </div>
  <div id="intro-screen">
    <video id="intro-video" playsinline preload="auto">
      <source id="intro-source" src="" type="video/mp4">
    </video>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const HORIZONTAL_VIDEO = "https://res.cloudinary.com/dnznq0mhf/video/upload/v1774950862/logo_zdkwk4.mp4";
    const VERTICAL_VIDEO = "https://res.cloudinary.com/dnznq0mhf/video/upload/v1774967276/logovertical_ebyhcy.mp4";

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    document.getElementById('intro-source').src = isMobile ? VERTICAL_VIDEO : HORIZONTAL_VIDEO;

    const firebaseConfig = {
      apiKey: "AIzaSyCeJzFMjr_r7gNrh1CW0RDmH9N2EwBLCxU",
      authDomain: "crspase.firebaseapp.com",
      projectId: "crspase",
      storageBucket: "crspase.firebasestorage.app",
      messagingSenderId: "153293486925",
      appId: "1:153293486925:web:e2b64495eced034d591504"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const tgUser = tg.initDataUnsafe?.user;

    if (!tgUser) {
      // Открыто не через Telegram
      document.getElementById('status-screen').style.display = 'flex';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-msg').textContent = 'Откройте через Telegram бот @cr_space_bot';
    } else {
      const userId = String(tgUser.id);
      sessionStorage.setItem('tg_user_id', userId);

      let docSnap;
      try {
        const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000));
        docSnap = await Promise.race([getDoc(doc(db, "whitelist", userId)), timeout]);
      } catch (e) {
        window.location.href = 'index.html';
        return;
      }
      if (docSnap.exists()) {
        // Доступ разрешён — играем анимацию логотипа
        document.getElementById('status-screen').style.display = 'none';
        const introScreen = document.getElementById('intro-screen');
        const video = document.getElementById('intro-video');
        video.load();
        introScreen.style.display = 'flex';
        video.play().catch(() => { window.location.href = 'index.html'; });
        video.addEventListener('ended', () => {
          introScreen.classList.add('fade-out');
          setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        });
        setTimeout(() => {
          if (!video.ended) { window.location.href = 'index.html'; }
        }, 15000);
      } else {
        // Нет в вайтлисте
        document.getElementById('status-screen').style.display = 'flex';
        document.getElementById('error-msg').style.display = 'block';
      }
    }
  </script>
</body>
</html>
