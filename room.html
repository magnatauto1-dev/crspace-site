<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CR Space — Сессия</title>
  <link rel="preconnect" href="https://vz-b520b635-2e5.b-cdn.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }

    .top-bar {
      position: fixed; top: 0; width: 100%;
      display: flex; align-items: center;
      padding: 24px 40px; z-index: 10;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
    }
    .top-logo img { height: 48px; width: auto; filter: brightness(0) invert(1); opacity: 0.85; }
    #video-container { width: 100%; height: 100vh; position: relative; transition: opacity 1.5s ease; }
    #video-container video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    #video-container.fade-out { opacity: 0; }

    #mobile-entry, #return-entry {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 50;
      flex-direction: column; align-items: center; justify-content: center; gap: 40px;
    }
    .rotate-icon { width: 80px; height: 80px; animation: rotateAnim 2s ease-in-out infinite; }
    @keyframes rotateAnim {
      0%   { transform: rotate(0deg); }
      40%  { transform: rotate(-90deg); }
      60%  { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }
    .rotate-icon svg { width: 80px; height: 80px; }
    .entry-hint {
      color: rgba(255,255,255,0.5);
      font-size: 10px; letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center; line-height: 2.2;
    }
    .entry-back-btn {
      position: absolute;
      bottom: 48px;
      left: 50%; transform: translateX(-50%);
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      background: none; border: none; cursor: pointer;
      transition: color 0.3s ease;
      white-space: nowrap;
    }
    .entry-back-btn:hover { color: rgba(255,255,255,0.8); }

    #mobile-top-bar {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      z-index: 55;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
    }
    #mobile-top-bar img {
      height: 36px; width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.85;
    }

    #android-video-wrap {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 40;
      background: #000;
    }
    #android-video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <div class="top-bar" id="top-bar">
    <div class="top-logo"><img src="logo.png" alt="CR Space"></div>
  </div>
  <div id="video-container">
    <video id="session-video" playsinline webkit-playsinline preload="none"></video>
    <div style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;"></div>
  </div>

  <div id="mobile-top-bar">
    <img src="logo.png" alt="CR Space">
  </div>

  <div id="mobile-entry">
    <button class="entry-back-btn" ontouchstart="event.stopPropagation()" onclick="history.back()">← назад</button>
    <div class="rotate-icon">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect x="18" y="8" width="28" height="48" rx="4" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
        <circle cx="32" cy="50" r="2" fill="rgba(255,255,255,0.7)"/>
        <path d="M20 28 L10 28 M10 28 L14 24 M10 28 L14 32" stroke="rgba(255,255,255,0.9)" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="entry-hint">поверни телефон<br>и коснись экрана</div>
  </div>

  <div id="return-entry">
    <button class="entry-back-btn" ontouchstart="event.stopPropagation()" onclick="history.back()">← назад</button>
    <div class="rotate-icon">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect x="18" y="8" width="28" height="48" rx="4" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
        <circle cx="32" cy="50" r="2" fill="rgba(255,255,255,0.7)"/>
        <path d="M20 28 L10 28 M10 28 L14 24 M10 28 L14 32" stroke="rgba(255,255,255,0.9)" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="entry-hint">коснись экрана<br>чтобы вернуться</div>
  </div>

  <!-- iOS видео — нативный HLS Safari -->
  <video id="mobile-video" preload="none" style="position:fixed;display:none;width:1px;height:1px;opacity:0;z-index:1;">
    <source src="https://vz-b520b635-2e5.b-cdn.net/62982d3e-5c90-4d41-9193-b2f633f00443/playlist.m3u8" type="application/x-mpegURL">
  </video>

  <!-- Android видео -->
  <div id="android-video-wrap">
    <video id="android-video" playsinline preload="none"></video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script type="module">
    const userId = sessionStorage.getItem('tg_user_id');
    if (!userId) { window.location.href = 'login.html'; }

    const HLS_SRC = 'https://vz-b520b635-2e5.b-cdn.net/62982d3e-5c90-4d41-9193-b2f633f00443/playlist.m3u8';

    // ── РЕЖИМ ЛИЧНОЙ СЕССИИ ──────────────────────────────────────────
    const _urlParams = new URLSearchParams(window.location.search);
    const sessionMode = _urlParams.get('session') === '1';
    const sessionTs = sessionMode ? parseInt(_urlParams.get('ts') || '0') : 0;

    if (sessionMode && sessionTs) {
      const timeUntil = sessionTs - Date.now();
      if (timeUntil > 15 * 60 * 1000) {
        const st = new Date(sessionTs);
        const hh = String(st.getHours()).padStart(2, '0');
        const mm = String(st.getMinutes()).padStart(2, '0');
        document.body.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
            height:100vh;background:#0f0f1a;color:white;font-family:-apple-system,sans-serif;text-align:center;padding:24px;">
            <img src="logo.png" style="width:72px;margin-bottom:32px;opacity:0.9;">
            <p style="font-size:16px;margin:0 0 12px;opacity:0.7;">Практика начнётся в</p>
            <p style="font-size:56px;font-weight:700;margin:0 0 12px;letter-spacing:2px;">${hh}:${mm}</p>
            <p style="font-size:13px;opacity:0.45;">по Испании</p>
          </div>`;
      }
    }
    // ────────────────────────────────────────────────────────────────

    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid = /Android/i.test(navigator.userAgent);
    const isMobile = isIOS || isAndroid;

    const MORNING_HOUR = 7;
    const EVENING_HOUR = 20;

    async function logVideoEntry() {
      try {
        const now = new Date();
        const session = now.getHours() < 12 ? 'morning' : 'evening';
        await fetch('https://crspace-bot-production.up.railway.app/log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, type: 'video_recording', session })
        });
      } catch (e) {}
    }

    function getCorrectTime() {
      if (sessionMode && sessionTs) {
        return Math.max(0, Math.floor((Date.now() - sessionTs) / 1000));
      }
      const now = new Date();
      const total = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
      const morning = MORNING_HOUR * 3600;
      const evening = EVENING_HOUR * 3600;
      if (total >= morning && total < morning + 3600) return total - morning;
      if (total >= evening && total < evening + 3600) return total - evening;
      return 0;
    }

    function attachHls(video, onReady) {
      if (Hls.isSupported()) {
        const hls = new Hls({ startLevel: -1, capLevelToPlayerSize: true });
        hls.loadSource(HLS_SRC);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, onReady);
        return hls;
      }
      return null;
    }

    // ── ДЕСКТОП ──
    if (!isMobile) {
      logVideoEntry();
      const video = document.getElementById('session-video');
      const container = document.getElementById('video-container');

      attachHls(video, () => {
        video.currentTime = getCorrectTime();
        video.muted = false;
        video.play().catch(() => {});
      });

      video.addEventListener('seeking', () => {
        const correct = getCorrectTime();
        if (correct > 0 && Math.abs(video.currentTime - correct) > 2) video.currentTime = correct;
      });
      video.addEventListener('pause', () => {
        if (!video.ended) video.play().catch(() => {});
      });
      video.addEventListener('ended', () => {
        sessionStorage.setItem('fromRoom', 'true');
        container.classList.add('fade-out');
        setTimeout(() => { window.location.href = 'end.html'; }, 1500);
      });
    }

    // ── ANDROID ──
    if (isAndroid) {
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('top-bar').style.display = 'none';
      document.getElementById('mobile-entry').style.display = 'flex';
      document.getElementById('mobile-top-bar').style.display = 'block';

      const video = document.getElementById('android-video');
      const wrap = document.getElementById('android-video-wrap');
      const returnEntry = document.getElementById('return-entry');
      let started = false;
      let hlsInstance = null;

      document.getElementById('mobile-entry').addEventListener('touchstart', () => {
        if (started) return;
        started = true;
        logVideoEntry();

        video.muted = false;
        video.volume = 1;

        const doLaunch = () => {
          const correct = getCorrectTime();
          if (correct > 0) video.currentTime = correct;
          video.play().catch(() => {});
          document.getElementById('mobile-entry').style.display = 'none';
          wrap.style.display = 'block';
          if (wrap.requestFullscreen) wrap.requestFullscreen().catch(() => {});
        };

        hlsInstance = attachHls(video, doLaunch);
        if (!hlsInstance) {
          // fallback — нет hls.js поддержки
          video.src = HLS_SRC;
          video.addEventListener('loadedmetadata', doLaunch, { once: true });
          video.load();
        }
      }, { once: true });

      document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && !video.ended) {
          returnEntry.style.display = 'flex';
          wrap.style.display = 'none';
          returnEntry.addEventListener('touchstart', () => {
            returnEntry.style.display = 'none';
            wrap.style.display = 'block';
            if (wrap.requestFullscreen) wrap.requestFullscreen().catch(() => {});
            video.play().catch(() => {});
          }, { once: true });
        }
      });

      video.addEventListener('seeking', () => {
        const correct = getCorrectTime();
        if (correct > 0 && Math.abs(video.currentTime - correct) > 2) video.currentTime = correct;
      });
      video.addEventListener('pause', () => {
        if (!video.ended) {
          setTimeout(() => { video.muted = false; video.volume = 1; video.play().catch(() => {}); }, 300);
        }
      });
      video.addEventListener('volumechange', () => {
        if (video.muted && !video.ended) { video.muted = false; video.volume = 1; }
      });
      video.addEventListener('ended', () => {
        sessionStorage.setItem('fromRoom', 'true');
        window.location.href = 'end.html';
      });
    }

    // ── iOS — Safari нативно поддерживает HLS ──
    if (isIOS) {
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('top-bar').style.display = 'none';
      document.getElementById('mobile-entry').style.display = 'flex';
      document.getElementById('mobile-top-bar').style.display = 'block';

      const video = document.getElementById('mobile-video');
      const returnEntry = document.getElementById('return-entry');
      let started = false;
      let watchdog = null;

      function startWatchdog() {
        if (watchdog) clearInterval(watchdog);
        watchdog = setInterval(() => {
          if (video.ended) { clearInterval(watchdog); return; }
          if (video.muted) { video.muted = false; video.volume = 1; }
          if (video.paused && returnEntry.style.display === 'none') video.play().catch(() => {});
        }, 1000);
      }

      function stopWatchdog() {
        if (watchdog) { clearInterval(watchdog); watchdog = null; }
      }

      function launchFullscreen() {
        const correct = getCorrectTime();
        video.muted = false;
        video.volume = 1;
        video.style.display = 'block';
        video.style.width = '1px';
        video.style.height = '1px';
        video.style.opacity = '0';
        returnEntry.style.display = 'none';
        document.getElementById('mobile-entry').style.display = 'none';

        const doLaunch = () => {
          video.currentTime = correct;
          video.play().then(() => {
            if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
            startWatchdog();
          }).catch(() => {});
        };

        if (video.readyState >= 1) {
          doLaunch();
        } else {
          video.addEventListener('loadedmetadata', doLaunch, { once: true });
          video.load();
        }
      }

      document.getElementById('mobile-entry').addEventListener('touchstart', () => {
        if (started) return;
        started = true;
        logVideoEntry();
        launchFullscreen();
      }, { once: true });

      video.addEventListener('webkitendfullscreen', () => {
        if (!video.ended) {
          stopWatchdog();
          video.pause();
          returnEntry.style.display = 'flex';
          returnEntry.addEventListener('touchstart', () => {
            launchFullscreen();
          }, { once: true });
        }
      });

      video.addEventListener('seeking', () => {
        const correct = getCorrectTime();
        if (correct > 0 && Math.abs(video.currentTime - correct) > 2) video.currentTime = correct;
      });
      video.addEventListener('volumechange', () => {
        if (video.muted && !video.ended) { video.muted = false; video.volume = 1; }
      });
      video.addEventListener('ended', () => {
        stopWatchdog();
        sessionStorage.setItem('fromRoom', 'true');
        window.location.href = 'end.html';
      });
    }
  </script>
</body>
</html>
