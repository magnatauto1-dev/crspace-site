<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1c1c1e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 40px 20px;
  }

  .hint-text {
    color: #ebebf5;
    font-size: 17px;
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.5;
    opacity: 0.9;
    max-width: 320px;
  }

  .hint-text span {
    color: #5ac8fa;
  }

  .bar-wrapper {
    position: relative;
    width: 100%;
    max-width: 390px;
  }

  .bar {
    background: #2c2c2e;
    border-radius: 20px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-crspace {
    background: #3478f6;
    border-radius: 20px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: white;
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-crspace svg { opacity: 0.95; }

  .btn-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #3a3a3c;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .input-field {
    flex: 1;
    background: #3a3a3c;
    border-radius: 20px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .input-placeholder {
    color: #6e6e73;
    font-size: 15px;
    flex: 1;
  }

  .input-icons {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* Кнопка меню — подсвечиваем */
  .btn-menu {
    position: relative;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #3a3a3c;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-menu::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(84,199,107,0.35) 0%, rgba(84,199,107,0) 70%);
    animation: pulse 1.8s ease-in-out infinite;
  }

  .btn-menu::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid #54c76b;
    animation: ring 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.6; }
  }

  @keyframes ring {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.5; }
  }

  .arrow-label {
    position: absolute;
    bottom: -52px;
    right: 10px;
    color: #54c76b;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    letter-spacing: 0.3px;
  }

  .arrow-label::before {
    content: '↑';
    font-size: 18px;
  }
</style>
</head>
<body>
  <div class="hint-text">
    Нажми сюда, чтобы открыть <span>меню практик</span>
  </div>

  <div class="bar-wrapper">
    <div class="bar">
      <!-- CR Space mini app button -->
      <div class="btn-crspace">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="white">
          <rect x="1" y="1" width="8" height="8" rx="2"/>
          <rect x="11" y="1" width="8" height="8" rx="2"/>
          <rect x="1" y="11" width="8" height="8" rx="2"/>
          <rect x="11" y="11" width="8" height="8" rx="2"/>
        </svg>
        CRSpace
      </div>

      <!-- Paperclip -->
      <div class="btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2" stroke-linecap="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </div>

      <!-- Input field -->
      <div class="input-field">
        <span class="input-placeholder">Повід...</span>
        <div class="input-icons">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6e6e73" stroke-width="1.8">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </div>
      </div>

      <!-- Menu button — highlighted -->
      <div class="btn-menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#54c76b">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </div>

      <!-- Camera -->
      <div class="btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="1.8">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M9 3h6l1.5 2H21a1 1 0 011 1v13a1 1 0 01-1 1H3a1 1 0 01-1-1V6a1 1 0 011-1h3.5L9 3z"/>
        </svg>
      </div>
    </div>

    <div class="arrow-label">меню практик</div>
  </div>
</body>
</html>
